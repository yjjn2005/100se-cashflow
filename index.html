<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>유재진 100세 캐시플로우</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
 --navy:#081627; --navy2:#0F2540; --navy3:#163252; --panel:#112a49; --panel2:#0c2138;
 --gold:#D4AF37; --gold2:#C9A24B; --gold-soft:#EFD9A0;
 --ink:#EAF1FA; --sub:#9FB3CC; --line:#23456e;
 --green:#46D6A0; --red:#F2776B; --blue:#6FA8FF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
 background:radial-gradient(1200px 700px at 80% -10%,#10325a 0%,var(--navy) 55%) , var(--navy);
 color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px 60px}
/* Header */
header{padding:26px 0 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:14px}
.crest{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
 background:linear-gradient(145deg,var(--gold),#9d7c25);color:#241a00;font-weight:800;font-size:20px;
 box-shadow:0 6px 20px rgba(212,175,55,.35)}
.brand h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
.brand .sub{font-size:12px;color:var(--sub);margin-top:2px}
.asof{font-size:12px;color:var(--sub);text-align:right}
.asof b{color:var(--gold-soft)}
/* Tabs */
nav{display:flex;gap:7px;overflow-x:auto;padding:8px 0 14px;scrollbar-width:thin;position:sticky;top:0;z-index:20;
 background:linear-gradient(var(--navy),rgba(8,22,39,.86));backdrop-filter:blur(6px)}
nav::-webkit-scrollbar{height:6px}nav::-webkit-scrollbar-thumb{background:#1d3c61;border-radius:6px}
.tab{white-space:nowrap;padding:9px 15px;border-radius:999px;border:1px solid var(--line);
 background:var(--panel2);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:.18s;flex:0 0 auto}
.tab:hover{color:var(--ink);border-color:#34618f}
.tab.active{background:linear-gradient(145deg,var(--gold),#a9842b);color:#211800;border-color:var(--gold);
 box-shadow:0 4px 16px rgba(212,175,55,.3)}
/* Cards */
.grid{display:grid;gap:14px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:860px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr}.cols-2{grid-template-columns:1fr}}
.card{background:linear-gradient(160deg,var(--panel) 0%,var(--panel2) 100%);
 border:1px solid var(--line);border-radius:16px;padding:18px}
.kpi{position:relative;overflow:hidden}
.kpi:before{content:"";position:absolute;left:0;top:0;width:3px;height:100%;background:linear-gradient(var(--gold),transparent)}
.kpi .label{font-size:12px;color:var(--sub);font-weight:600}
.kpi .val{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
.kpi .val.gold{color:var(--gold-soft)} .kpi .val.green{color:var(--green)} .kpi .val.blue{color:var(--blue)}
.kpi .note{font-size:11px;color:var(--sub);margin-top:5px}
.sec-title{display:flex;align-items:center;gap:9px;margin:24px 2px 12px;font-size:15px;font-weight:800;color:var(--gold-soft)}
.sec-title .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.panel-h .ttl{font-size:17px;font-weight:800;display:flex;align-items:center;gap:10px}
.ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:17px;
 background:var(--navy3);border:1px solid var(--line)}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
.badge.fix{background:rgba(111,168,255,.14);color:var(--blue);border:1px solid rgba(111,168,255,.35)}
.badge.edit{background:rgba(212,175,55,.14);color:var(--gold-soft);border:1px solid rgba(212,175,55,.4)}
/* inputs */
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:5px}
.field input{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line);
 background:var(--navy);color:var(--ink);font-size:15px;font-weight:700;font-family:inherit;transition:.15s}
.field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.16)}
.field input:disabled{color:var(--sub);background:#0a1d33;font-weight:600;cursor:not-allowed}
.field .unit{font-size:11px;color:var(--sub);margin-top:4px}
.readonly-note{font-size:12px;color:var(--sub);line-height:1.6;background:var(--navy);border:1px dashed var(--line);
 border-radius:11px;padding:12px 14px}
.readonly-note b{color:var(--gold-soft)}
/* table */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
th{color:var(--sub);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td{color:var(--ink);font-weight:600}
tr.decade td{background:rgba(212,175,55,.07)}
td.num{font-variant-numeric:tabular-nums}
.pos{color:var(--green)} .neg{color:var(--red)}
.chartbox{position:relative;height:300px}
.chartbox.sm{height:240px}
.legend-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:12px;color:var(--sub)}
.legend-row span{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
/* calculator */
.calc-out{text-align:center;padding:8px 0}
.calc-out .big{font-size:44px;font-weight:800;color:var(--gold-soft);letter-spacing:-1px}
.calc-out .big small{font-size:18px;color:var(--sub);font-weight:600}
.calc-out .age{font-size:14px;color:var(--sub);margin-top:4px}
.bars{margin-top:6px}
.barrow{display:flex;align-items:center;gap:10px;margin:9px 0}
.barrow .nm{width:96px;font-size:13px;font-weight:600;color:var(--sub);flex:0 0 auto}
.barrow .tr{flex:1;height:13px;background:var(--navy);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
.barrow .fl{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--gold2),var(--gold-soft));transition:width .5s}
.barrow .vl{width:78px;text-align:right;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;flex:0 0 auto}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:5px;background:var(--navy3);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
 background:linear-gradient(145deg,var(--gold),#9d7c25);cursor:pointer;box-shadow:0 3px 10px rgba(212,175,55,.5)}
.hide{display:none}
.foot{margin-top:30px;font-size:11px;color:var(--sub);text-align:center;line-height:1.7}
.pill{display:inline-block;font-size:11px;font-weight:700;color:var(--gold-soft);background:rgba(212,175,55,.1);
 border:1px solid rgba(212,175,55,.3);border-radius:999px;padding:3px 10px;margin-left:6px}
.reset{font-size:12px;color:var(--sub);background:none;border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer}
.reset:hover{color:var(--ink);border-color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
 <header>
  <div class="brand">
   <div class="crest">柳</div>
   <div><h1>유재진 100세 캐시플로우</h1>
    <div class="sub">연금 · 배당 · 임대 종합 자산설계 &nbsp;|&nbsp; 만 60 → 100세 (2026–2066)</div></div>
  </div>
  <div class="asof">기준일 <b>2026.06.26</b><br/>단위 만원/월 (세후)</div>
 </header>
 <nav id="nav"></nav>
 <div id="view"></div>
 <div class="foot">
  본 도구는 가정에 기반한 추정치이며 실제 수령액·세금·제도와 다를 수 있습니다. 투자·세무 결정은 전문가와 상담하세요.<br/>
  © 2026 유재진 자산설계 · 농지·급여·국민·주택연금은 고정(공식), IRP·법인배당·부동산임대·주식운용은 수동입력
 </div>
</div>
<script>
/* ===================== MODEL ===================== */
const BIRTH=1966, Y0=2026, Y1=2066;
const FIXED={salary:1000, salEnd:2027, farm1:300, farm1End:2036, farm2:220,
 npsBase:160, npsStart:2030, cpi:0.02, house:350, houseStart:2032};
const DEFAULTS={
 irp:{amt:400,start:2027,end:2054},
 corp:{amt:180,start:2027,growth:0.03},
 rent:{amt:300},
 stock:{amt:200,start:2030,growth:0},
 living:{active:1200,late:900,switchAge:85}
};
let S=load();
function load(){try{const v=JSON.parse(localStorage.getItem('jjcf'));if(v&&v.irp)return v;}catch(e){}
 return JSON.parse(JSON.stringify(DEFAULTS));}
function save(){localStorage.setItem('jjcf',JSON.stringify(S));}
function reset(){S=JSON.parse(JSON.stringify(DEFAULTS));save();render();}

const SRC=[
 {key:'salary',name:'급여',icon:'💼',fixed:true,color:'#8FA9CE'},
 {key:'farm',name:'농지연금',icon:'🌾',fixed:true,color:'#7FB77E'},
 {key:'irp',name:'IRP연금',icon:'🏦',fixed:false,color:'#6FA8FF'},
 {key:'corp',name:'법인배당',icon:'🏛️',fixed:false,color:'#C9A24B'},
 {key:'rent',name:'부동산임대',icon:'🏠',fixed:false,color:'#E0A96D'},
 {key:'stock',name:'주식운용',icon:'📈',fixed:false,color:'#B98FE0'},
 {key:'nps',name:'국민연금',icon:'🛡️',fixed:true,color:'#5BD1C0'},
 {key:'house',name:'주택연금',icon:'🔑',fixed:true,color:'#F2B36B'},
];
function monthly(key,y){
 const age=y-BIRTH;
 switch(key){
  case 'salary': return y<=FIXED.salEnd?FIXED.salary:0;
  case 'farm':   return y<=FIXED.farm1End?FIXED.farm1:FIXED.farm2;
  case 'irp':    return (y>=S.irp.start&&y<=S.irp.end)?S.irp.amt:0;
  case 'corp':   return y>=S.corp.start?S.corp.amt*Math.pow(1+S.corp.growth,y-S.corp.start):0;
  case 'rent':   return S.rent.amt;
  case 'stock':  return y>=S.stock.start?S.stock.amt*Math.pow(1+S.stock.growth,y-S.stock.start):0;
  case 'nps':    return y>=FIXED.npsStart?FIXED.npsBase*Math.pow(1+FIXED.cpi,y-FIXED.npsStart):0;
  case 'house':  return y>=FIXED.houseStart?FIXED.house:0;
 } return 0;
}
function livingFor(y){return (y-BIRTH)>=S.living.switchAge?S.living.late:S.living.active;}
function years(){const a=[];for(let y=Y0;y<=Y1;y++)a.push(y);return a;}
function totalMonthly(y){return SRC.reduce((s,o)=>s+monthly(o.key,y),0);}
function lifetime(key){return years().reduce((s,y)=>s+monthly(key,y)*12,0);} // 만원
function lifetimeAll(){return SRC.reduce((s,o)=>s+lifetime(o.key),0);}
function maxMonthly(){return Math.max(...years().map(totalMonthly));}
/* cumulative asset (3% + net cashflow), start 23.5억 */
function assetSeries(){let r=23.5;const out={};for(const y of years()){
 const inc=totalMonthly(y)*12; const gift=(y===2031?20000:0); const net=inc-(livingFor(y)*12+gift);
 r=r*1.03+net/10000; out[y]=r;} return out;}
/* ===================== FORMAT ===================== */
const fmt=n=>Math.round(n).toLocaleString('ko-KR');
const fmt1=n=>(Math.round(n*10)/10).toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1});
const eok=man=>fmt1(man/10000);

/* ===================== TABS ===================== */
const TABS=[{k:'dash',n:'대시보드',i:'📊'}].concat(SRC.map(s=>({k:s.key,n:s.name,i:s.icon}))).concat([{k:'calc',n:'수령액 계산기',i:'🧮'}]);
let cur='dash';
function render(){
 document.getElementById('nav').innerHTML=TABS.map(t=>
  `<div class="tab ${t.k===cur?'active':''}" onclick="go('${t.k}')">${t.i} ${t.n}</div>`).join('');
 const v=document.getElementById('view');
 if(cur==='dash')v.innerHTML=dashHTML();
 else if(cur==='calc')v.innerHTML=calcHTML();
 else v.innerHTML=srcHTML(cur);
 mountCharts();
 if(cur==='calc')initCalc();
}
function go(k){cur=k;window.scrollTo(0,0);render();}

/* ===================== DASHBOARD ===================== */
function dashHTML(){
 const lifeAll=lifetimeAll(), assets=assetSeries(), endAsset=assets[Y1];
 const peak=maxMonthly();
 const totNet=years().reduce((s,y)=>s+(totalMonthly(y)*12-(livingFor(y)*12+(y===2031?20000:0))),0);
 const rows=SRC.map(o=>({...o,life:lifetime(o.key)})).sort((a,b)=>b.life-a.life);
 return `
 <div class="grid cols-4">
  ${kpi('평생 총수입','gold',eok(lifeAll)+'<small style="font-size:15px">억</small>','8개 수입원 합산 (2026–2066)')}
  ${kpi('월수입 최대','green',fmt(peak)+'<small style="font-size:15px">만</small>','정점 연도 기준')}
  ${kpi('평생 순현금','blue',eok(totNet)+'<small style="font-size:15px">억</small>','수입 − 생활비·증여')}
  ${kpi('만 100세 잔여자산','gold',fmt1(endAsset)+'<small style="font-size:15px">억</small>','3% 운용 복리 추산')}
 </div>
 <div class="sec-title">항목별 평생 총수령 <span class="ln"></span></div>
 <div class="grid cols-2">
  <div class="card"><div class="panel-h"><div class="ttl">📊 수입원별 비중</div></div>
    <div class="chartbox sm"><canvas id="cDough"></canvas></div></div>
  <div class="card"><div class="panel-h"><div class="ttl">🏅 항목별 총합 (억)</div></div>
    <div class="chartbox sm"><canvas id="cBar"></canvas></div></div>
 </div>
 <div class="sec-title">월 수입 구성 추이 (만원/월) <span class="ln"></span></div>
 <div class="card"><div class="chartbox"><canvas id="cArea"></canvas></div>
   <div class="legend-row">${SRC.map(o=>`<span><i class="dot" style="background:${o.color}"></i>${o.name}</span>`).join('')}</div>
 </div>
 <div class="sec-title">항목별 요약 <span class="ln"></span></div>
 <div class="card"><table><thead><tr><th>수입원</th><th>구분</th><th>평생 총수령(억)</th><th>비중</th><th>최대 월수령(만)</th></tr></thead>
 <tbody>${rows.map(o=>{const mx=Math.max(...years().map(y=>monthly(o.key,y)));
   return `<tr><td><i class="dot" style="background:${o.color}"></i> ${o.name}</td>
   <td style="text-align:left"><span class="badge ${o.fixed?'fix':'edit'}">${o.fixed?'고정':'수정가능'}</span></td>
   <td class="num">${eok(o.life)}</td><td class="num">${fmt1(o.life/lifeAll*100)}%</td>
   <td class="num">${fmt(mx)}</td></tr>`}).join('')}
 <tr style="border-top:2px solid var(--gold)"><td><b>합계</b></td><td></td><td class="num"><b style="color:var(--gold-soft)">${eok(lifeAll)}</b></td><td class="num">100%</td><td></td></tr>
 </tbody></table></div>`;
}
function kpi(label,cls,val,note){return `<div class="card kpi"><div class="label">${label}</div>
 <div class="val ${cls}">${val}</div><div class="note">${note}</div></div>`;}

/* ===================== SOURCE TAB ===================== */
function srcHTML(key){
 const o=SRC.find(s=>s.key===key);
 const life=lifetime(key), mx=Math.max(...years().map(y=>monthly(key,y)));
 const startY=years().find(y=>monthly(key,y)>0)||'-';
 let ctrl;
 if(!o.fixed){ ctrl=editControls(key); }
 else{ ctrl=`<div class="readonly-note">${fixedNote(key)}</div>`; }
 // decade table
 const decs=[2026,2030,2036,2040,2046,2050,2056,2060,2066];
 const tbl=decs.map(y=>`<tr class="${(y-BIRTH)%10===0?'decade':''}"><td>${y}</td><td class="num">${y-BIRTH}세</td>
   <td class="num">${fmt(monthly(key,y))}</td><td class="num">${fmt(monthly(key,y)*12)}</td></tr>`).join('');
 return `
 <div class="card">
  <div class="panel-h"><div class="ttl"><span class="ico">${o.icon}</span> ${o.name}
   <span class="badge ${o.fixed?'fix':'edit'}">${o.fixed?'고정 (공식)':'수정 가능'}</span></div>
   ${o.fixed?'':'<button class="reset" onclick="reset()">전체 기본값 복원</button>'}</div>
  <div class="grid cols-2" style="align-items:start">
   <div>${ctrl}</div>
   <div class="grid cols-3" style="grid-template-columns:1fr 1fr 1fr">
     ${kpi('평생 총수령','gold',eok(life)+'<small>억</small>','')}
     ${kpi('최대 월수령','green',fmt(mx)+'<small>만</small>','')}
     ${kpi('개시 연도','blue',startY,'')}
   </div>
  </div>
 </div>
 <div class="grid cols-2">
  <div class="card"><div class="panel-h"><div class="ttl">📈 연도별 월수령 추이</div></div>
   <div class="chartbox sm"><canvas id="cSrc"></canvas></div></div>
  <div class="card"><div class="panel-h"><div class="ttl">📋 10년 단위 요약</div></div>
   <table><thead><tr><th>연도</th><th>나이</th><th>월수령(만)</th><th>연수령(만)</th></tr></thead><tbody>${tbl}</tbody></table></div>
 </div>`;
}
function editControls(key){
 if(key==='irp')return grp([
   inp('IRP 월 인출액','irp.amt',S.irp.amt,'만/월'),
   inp('시작 연도','irp.start',S.irp.start,'년'),
   inp('종료 연도 (소진)','irp.end',S.irp.end,'년')]);
 if(key==='corp')return grp([
   inp('법인배당 시작액','corp.amt',S.corp.amt,'만/월'),
   inp('시작 연도','corp.start',S.corp.start,'년'),
   inp('연 증가율 (%)','corp.growth',+(S.corp.growth*100).toFixed(2),'%/년',true)]);
 if(key==='rent')return grp([
   inp('부동산 임대수입 월액','rent.amt',S.rent.amt,'만/월 · 전기간 정액')]);
 if(key==='stock')return grp([
   inp('주식운용 월수입','stock.amt',S.stock.amt,'만/월'),
   inp('시작 연도','stock.start',S.stock.start,'년'),
   inp('연 증가율 (%)','stock.growth',+(S.stock.growth*100).toFixed(2),'%/년',true)]);
 return '';
}
function grp(arr){return `<div>${arr.join('')}</div>`;}
function inp(label,path,val,unit,pct){return `<div class="field"><label>${label}</label>
 <input type="number" step="any" value="${val}" oninput="setVal('${path}',this.value,${pct?1:0})"/>
 <div class="unit">${unit}</div></div>`;}
function setVal(path,v,pct){v=parseFloat(v); if(isNaN(v))return;
 if(pct)v=v/100;
 const[a,b]=path.split('.'); S[a][b]=v; save(); render();}
function fixedNote(key){
 if(key==='salary')return '근로소득 <b>월 1,000만원</b> (세후) · 2026~2027년 수령 후 종료. <br/>※ 고정 항목으로 직접 수정되지 않습니다.';
 if(key==='farm')return '농지연금 (감정평가액 15억) · 1기 <b>월 300만원</b> (2026~2036) → 2기 <b>월 220만원</b> (2037~종신). <br/>※ 제도 기준 고정 항목.';
 if(key==='nps')return `국민연금 기준 <b>월 160만원</b> · 2030년(64세) 개시 · 매년 물가 <b>2%</b> 연동. <br/>예) 2030 160만 → 2046 약 ${fmt(monthly('nps',2046))}만 → 2066 약 ${fmt(monthly('nps',2066))}만. <br/>※ 고정 항목.`;
 if(key==='house')return '주택연금 (거주 아파트 23억) · <b>66세(2032)부터 월 350만원 종신</b> 수령. <br/>※ 가입자격(공시가 12억 이하) 사전 확인 필요 · 고정 항목.';
 return '';
}

/* ===================== CALCULATOR ===================== */
function calcHTML(){
 return `<div class="grid cols-2" style="align-items:start">
  <div class="card">
   <div class="panel-h"><div class="ttl"><span class="ico">🧮</span> 연도·나이 입력</div></div>
   <div class="field"><label>연도</label>
     <input id="cY" type="number" min="${Y0}" max="${Y1}" value="2036" oninput="syncFromYear()"/>
     <div class="unit">${Y0} ~ ${Y1}</div></div>
   <div class="field"><label>나이 (만)</label>
     <input id="cA" type="number" min="${Y0-BIRTH}" max="${Y1-BIRTH}" value="${2036-BIRTH}" oninput="syncFromAge()"/>
     <div class="unit">${Y0-BIRTH}세 ~ ${Y1-BIRTH}세 · 출생 ${BIRTH}년 기준</div></div>
   <input id="cR" type="range" min="${Y0}" max="${Y1}" value="2036" oninput="document.getElementById('cY').value=this.value;syncFromYear()"/>
  </div>
  <div class="card">
   <div class="calc-out">
     <div class="age" id="oAge"></div>
     <div class="big" id="oTot"></div>
     <div class="age">월 총 수령액 (세후) · 연 환산 <span id="oYr"></span></div>
   </div>
  </div>
 </div>
 <div class="card" style="margin-top:14px">
   <div class="panel-h"><div class="ttl">📋 항목별 월 수령 내역</div></div>
   <div class="bars" id="oBars"></div>
 </div>`;
}
function initCalc(){syncFromYear();}
function syncFromYear(){let y=clamp(+document.getElementById('cY').value,Y0,Y1);
 document.getElementById('cA').value=y-BIRTH; document.getElementById('cR').value=y; calcOut(y);}
function syncFromAge(){let a=clamp(+document.getElementById('cA').value,Y0-BIRTH,Y1-BIRTH);
 let y=a+BIRTH; document.getElementById('cY').value=y; document.getElementById('cR').value=y; calcOut(y);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function calcOut(y){
 const tot=totalMonthly(y);
 document.getElementById('oAge').textContent=`${y}년 · 만 ${y-BIRTH}세`;
 document.getElementById('oTot').innerHTML=`${fmt(tot)} <small>만원</small>`;
 document.getElementById('oYr').textContent=`${fmt(tot*12)}만원`;
 const mx=Math.max(...SRC.map(o=>monthly(o.key,y)),1);
 document.getElementById('oBars').innerHTML=SRC.map(o=>{const m=monthly(o.key,y);
  return `<div class="barrow"><div class="nm">${o.icon} ${o.name}</div>
   <div class="tr"><div class="fl" style="width:${m/mx*100}%;background:linear-gradient(90deg,${o.color},${o.color}cc)"></div></div>
   <div class="vl">${fmt(m)}만</div></div>`;}).join('');
}

/* ===================== CHARTS ===================== */
let charts=[];
function mountCharts(){
 charts.forEach(c=>c.destroy()); charts=[];
 Chart.defaults.color='#9FB3CC'; Chart.defaults.font.family="'Inter','Malgun Gothic',sans-serif";
 Chart.defaults.borderColor='rgba(35,69,110,.5)';
 const ys=years();
 if(cur==='dash'){
  const rows=SRC.map(o=>({...o,life:lifetime(o.key)})).sort((a,b)=>b.life-a.life);
  charts.push(new Chart(cDough,{type:'doughnut',data:{labels:rows.map(r=>r.name),
    datasets:[{data:rows.map(r=>+(r.life/10000).toFixed(1)),backgroundColor:rows.map(r=>r.color),borderColor:'#0c2138',borderWidth:2}]},
    options:{plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}},cutout:'58%'}}));
  charts.push(new Chart(cBar,{type:'bar',data:{labels:rows.map(r=>r.name),
    datasets:[{data:rows.map(r=>+(r.life/10000).toFixed(1)),backgroundColor:rows.map(r=>r.color),borderRadius:6}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(35,69,110,.4)'}},y:{grid:{display:false}}}}}));
  charts.push(new Chart(cArea,{type:'line',data:{labels:ys,
    datasets:SRC.map(o=>({label:o.name,data:ys.map(y=>Math.round(monthly(o.key,y))),
      backgroundColor:o.color+'cc',borderColor:o.color,fill:true,pointRadius:0,borderWidth:1,tension:.25}))},
    options:{plugins:{legend:{display:false}},interaction:{mode:'index',intersect:false},
     scales:{x:{stacked:true,grid:{display:false},ticks:{maxTicksLimit:9}},
             y:{stacked:true,grid:{color:'rgba(35,69,110,.4)'},title:{display:true,text:'만원/월'}}}}}));
 } else if(SRC.find(s=>s.key===cur)){
  const o=SRC.find(s=>s.key===cur);
  charts.push(new Chart(cSrc,{type:'bar',data:{labels:ys,
    datasets:[{label:o.name,data:ys.map(y=>Math.round(monthly(o.key,y))),backgroundColor:o.color+'cc',borderColor:o.color,borderRadius:3}]},
    options:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:9}},
      y:{grid:{color:'rgba(35,69,110,.4)'},title:{display:true,text:'만원/월'}}}}}));
 }
}
render();
</script>
</body>
</html>
